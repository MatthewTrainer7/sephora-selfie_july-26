<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1080, height=1920"/>
<title>Sephora Selfie</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  /* Fixed D6 canvas. The player renders at native 1080x1920; centering only
     affects preview on larger displays. */
  #stage {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1080px;
    height: 1920px;
    margin-left: -540px;
    margin-top: -960px;
    overflow: hidden;
    background: #000;
  }

  #stage img {
    position: absolute;
    display: block;
  }

  /* Full-stage layers */
  #main-message,
  #frame {
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    object-fit: cover;
  }
  #main-message { z-index: 2; }
  #frame { z-index: 1; }

  /* Approved selfie overlaid on the frame. Two stacked layers crossfade
     between images via an opacity transition. */
  .selfie {
    top: 148px;
    left: 151px;
    width: 769px;
    height: 1363px;
    object-fit: cover;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="stage">
    <img id="frame" src="user-image.png" alt="" class="hidden"/>
    <img id="selfieA" class="selfie" alt=""/>
    <img id="selfieB" class="selfie" alt=""/>
    <img id="main-message" src="main-message.png" alt=""/>
  </div>
  <script src="app.js"></script>
</body>
</html>
